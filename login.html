<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Square - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0a0a0a; --card: #151515; }
        body { background-color: var(--bg); color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); width: 350px; text-align: center; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        h2 { color: var(--gold); margin-bottom: 30px; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--gold); }
        .login-btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-btn:hover { background: #FFD700; transform: translateY(-2px); }
        #error-msg { color: #ff4d4d; font-size: 0.8rem; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>M SQUARE ADMIN</h2>
        <div id="error-msg">Invalid Credentials!</div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">LOGIN</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const res = await fetch('http://localhost:5000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });

            const data = await res.json();
            if (data.success) {
                localStorage.setItem('adminToken', 'isLoggedIn'); // Temporary token
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };
    </script>
</body>
</html>
