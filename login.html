<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Square | Executive Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .royal-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            border-radius: 2px; /* Sharp edges look more expensive */
            position: relative;
        }

        /* Gold Line Decoration */
        .royal-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #D4AF37, #F1D382, #D4AF37);
        }

        
            .gold-text {
    font-family: 'Playfair Display', serif;
    background: linear-gradient(to right, #D4AF37, #F1D382, #D4AF37);
    -webkit-background-clip: text; /* Chrome/Safari ke liye */
    background-clip: text;         /* Standard version (VS Code yahi maang raha hai) */
    -webkit-text-fill-color: transparent;
}
        

        .gold-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            transition: all 0.3s;
        }

        .gold-input:focus {
            border-bottom-color: #D4AF37;
            outline: none;
            box-shadow: 0 1px 0 0 #D4AF37;
        }

        .gold-btn {
            background: #D4AF37;
            color: #000;
            font-weight: 700;
            letter-spacing: 2px;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .gold-btn:hover {
            background: #f1d382;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .ornament {
            color: #D4AF37;
            opacity: 0.5;
            font-size: 0.8rem;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <div class="royal-card text-center">
        <div class="ornament mb-2">✦ ━━━━━━ ✦</div>
        <h1 class="text-4xl font-bold gold-text mb-2 tracking-tighter">M SQUARE</h1>
        <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] mb-12">Executive Administration</p>

        <form id="login-form" class="space-y-10">
            <div class="text-left">
                <label class="text-zinc-500 text-xs uppercase tracking-widest mb-2 block">Access Token</label>
                <input type="password" id="admin-password" class="gold-input w-full py-2 px-0" placeholder="••••••••" required>
            </div>

            <button type="submit" class="gold-btn w-full py-4 text-xs uppercase rounded-sm">
                Unlock Dashboard
            </button>
        </form>

        <div id="error-msg" class="mt-6 text-red-500 text-xs hidden italic">Invalid credentials.</div>
        <div class="ornament mt-12">✦ ━━━━━━ ✦</div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('admin-password').value;
            const errorMsg = document.getElementById('error-msg');

            // Security: We send password to server to check
            const response = await fetch('http://localhost:5000/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            const result = await response.json();

            if (result.success) {
                // Agar password sahi hai, toh token save karo aur dashboard pe jao
                sessionStorage.setItem('adminToken', 'verified'); 
                window.location.href = 'admin.html';
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('admin-password').value = '';
            }
        });
    </script>
</body>
</html>
