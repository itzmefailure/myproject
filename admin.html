<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M Square - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --bg: #0a0a0a;
            --card: #151515;
            --white: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #000;
            border-right: 1px solid var(--gold);
            padding: 30px 20px;
            position: fixed;
        }

        .sidebar h2 { color: var(--gold); margin-bottom: 40px; font-size: 1.5rem; text-align: center; }

        .nav-item {
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--gold);
            text-align: center;
        }

        .stat-card h3 { font-size: 2rem; margin: 0; color: var(--gold); }

        /* Table Styling */
        .table-container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            color: var(--gold);
            padding: 15px;
            border-bottom: 1px solid #333;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #222;
            font-size: 0.9rem;
        }

        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .hidden { display: none; }

        .refresh-btn {
            background: var(--gold);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .refresh-btn:hover { background: #FFD700; transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="sidebar">
        <h2>M SQUARE</h2>
        <div class="nav-item active" onclick="showTab('admissionTab')">Admissions</div>
        <div class="nav-item" onclick="showTab('contactTab')">Inquiries</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <button class="refresh-btn" onclick="fetchData()">Refresh Data</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <p>Total Admissions</p>
                <h3 id="count-admission">0</h3>
            </div>
            <div class="stat-card">
                <p>New Inquiries</p>
                <h3 id="count-contact">0</h3>
            </div>
        </div>

        <div id="admissionTab" class="tab-content">
            <h2 style="color: var(--gold); margin-bottom: 20px;">Student Admissions</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Father's Name</th>
                            <th>Phone</th>
                            <th>Stream</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="admissionBody">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="contactTab" class="tab-content hidden">
            <h2 style="color: var(--gold); margin-bottom: 20px;">General Inquiries</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Message</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="contactBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // Check if user is logged in
if (localStorage.getItem('adminToken') !== 'isLoggedIn') {
    window.location.href = 'login.html';
}

// Logout function add kar sakte hain
function logout() {
    localStorage.removeItem('adminToken');
    window.location.href = 'login.html';
}
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            
            document.getElementById(tabId).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        async function fetchData() {
            try {
                // Fetch Admissions
                const admRes = await fetch('http://localhost:5000/api/admissions');
                const admData = await admRes.json();
                
                const admBody = document.getElementById('admissionBody');
                admBody.innerHTML = '';
                admData.forEach(item => {
                    admBody.innerHTML += `
                        <tr>
                            <td>${item.studentName}</td>
                            <td>${item.fatherName}</td>
                            <td>${item.phone}</td>
                            <td style="color: var(--gold)">${item.stream}</td>
                            <td>${new Date(item.date).toLocaleDateString()}</td>
                        </tr>
                    `;
                });
                document.getElementById('count-admission').innerText = admData.length;

                // Fetch Contacts
                const conRes = await fetch('http://localhost:5000/api/contacts');
                const conData = await conRes.json();
                
                const conBody = document.getElementById('contactBody');
                conBody.innerHTML = '';
                conData.forEach(item => {
                    conBody.innerHTML += `
                        <tr>
                            <td>${item.name}</td>
                            <td>${item.email}</td>
                            <td>${item.message}</td>
                            <td>${new Date(item.date).toLocaleDateString()}</td>
                        </tr>
                    `;
                });
                document.getElementById('count-contact').innerText = conData.length;

            } catch (err) {
                console.error("Data fetch error:", err);
            }
        }

        // Initial fetch
        fetchData();
    </script>
</body>
</html>
